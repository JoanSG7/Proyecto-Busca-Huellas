<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editar Perfil - Busca Huellas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    :root {
        --primary: #2D6A4F;
        --primary-container: #2d6a4f;
        --on-primary: #ffffff;
        --background: #fdf9f1;
        --surface: #fdf9f1;
        --surface-container-high: #ece8e0;
        --surface-container-highest: #e6e2da;
        --on-surface: #1c1c17;
        --on-surface-variant: #404943;
        --outline: #707973;
        --secondary-container: #ffd1ac;
        --on-secondary-container: #7a583b;
        --radius-full: 9999px;
        --radius-default: 1rem;
    }
    
    body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--background);
        color: var(--on-surface);
        min-height: 100-vh;
    }

    main {
        padding: 8rem 1.5rem 6rem;
        max-width: 56rem;
        margin: 0 auto;
    }

    .header-section {
        margin-bottom: 3rem;
    }

    .header-section h1 {
        font-size: 2.25rem;
        font-weight: 800;
        color: var(--primary);
        margin: 0 0 0.5rem;
    }

    .header-section p {
        font-size: 1.125rem;
        color: var(--on-surface-variant);
        margin: 0;
    }

    .content-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 3rem;
    }

    @media (min-width: 768px) {
        .content-grid {
            grid-template-columns: 1fr 2fr;
        }
    }

    .profile-sidebar {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
    }

    .photo-container {
        position: relative;
    }

    .organic-blob {
        width: 12rem;
        height: 12rem;
        background-color: var(--surface-container-highest);
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        overflow: hidden;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .organic-blob img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .camera-btn {
        position: absolute;
        bottom: 0.5rem;
        right: 0.5rem;
        background-color: var(--primary);
        color: var(--on-primary);
        border: none;
        padding: 0.75rem;
        border-radius: var(--radius-full);
        cursor: pointer;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .change-photo-btn {
        background: none;
        border: none;
        color: var(--primary);
        font-weight: 700;
        cursor: pointer;
        font-size: 0.875rem;
    }

    .change-photo-btn:hover {
        text-decoration: underline;
    }

    .photo-info {
        font-size: 0.75rem;
        color: var(--on-surface-variant);
        text-align: center;
        margin-top: 0.5rem;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--on-surface-variant);
        margin-left: 1rem;
    }

    input {
        width: 100%;
        background-color: var(--surface-container-high);
        border: none;
        border-radius: var(--radius-full);
        padding: 1rem 1.5rem;
        font-size: 1rem;
        color: var(--on-surface);
        box-sizing: border-box;
    }

    input:focus {
        outline: 2px solid var(--primary-container);
    }

    .button-group {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding-top: 2rem;
    }

    @media (min-width: 640px) {
        .button-group {
            flex-direction: row;
        }
    }

    .btn-save {
        background-color: var(--primary);
        color: var(--on-primary);
        border: none;
        padding: 1rem 2.5rem;
        border-radius: var(--radius-full);
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-cancel {
        background-color: var(--secondary-container);
        color: var(--on-secondary-container);
        border: none;
        padding: 1rem 2.5rem;
        border-radius: var(--radius-full);
        font-weight: 700;
        cursor: pointer;
    }

    footer {
        margin-top: 4rem;
        background-color: #f1ede5;
        padding: 3rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        border-radius: 3rem 3rem 0 0;
    }

    .footer-links {
        display: flex;
        gap: 2rem;
    }

    .footer-links a {
        text-decoration: none;
        color: var(--on-surface-variant);
        font-size: 0.875rem;
    }

    .footer-copy {
        color: #79573a;
        font-size: 0.875rem;
        text-align: center;
    }

    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
</style>
</head>
<body>
    {% include 'includes/_header-up.html' %}
<main>
<div class="header-section">
<h1>Editar Información</h1>
<p>Personaliza tu perfil y mantén tus datos actualizados para la comunidad.</p>
</div>
<div class="content-grid">
<div class="profile-sidebar">
<div class="photo-container">
<div class="organic-blob">
<img alt="Profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGow7a4IjUTT3pS6xyhrVIZeYHBXNc9z4l4NmpKAKZDGgtWMvL8ZQwmLxm8XU3A7eFF7TmkMcOvYkc89zfjCR3aSF9Wzh3TzKWYdoDmFiwSGhdJy6F8j5xdSe5eLqRvUDGMT0WiSYtoJRtW9tpPgnpSDDMrHxblrAhxftNtwHrm-Dfmnoq9fkMT-sNaiBDENCc_i1QRTUM6BOmwMqLXTeS7ybMqrTTz36cuiCAqwP_5ftlfdE8xa_s7f-lYkjYUFXm8c1dNQNpOw2A"/>
</div>
<button class="camera-btn"><span class="material-symbols-outlined">photo_camera</span></button>
</div>
<button class="change-photo-btn">Cambiar foto de perfil</button>
<p class="photo-info">JPG, PNG o WEBP. Tamaño máximo de 5MB.</p>
</div>
<div class="form-section">
<form>
<div class="form-group">
<label for="fullname">Nombre Completo</label>
<input id="fullname" type="text" value="Julian Forest"/>
</div>
<div class="form-group">
<label for="email">Correo Electrónico</label>
<input id="email" type="email" value="julian@buscahuellas.org"/>
</div>
<div class="form-group">
<label for="phone">Teléfono</label>
<input id="phone" type="tel" value="+34 600 000 000"/>
</div>
<div class="button-group">
<button class="btn-save" type="submit">
<span class="material-symbols-outlined">save</span>
                        Guardar Cambios
                    </button>
<button class="btn-cancel" type="button">Cancelar</button>
</div>
</form>
</div>
</div>
</main>
</body></html>
